# Evaluation configuration for video super-resolution

# Model configuration
model:
  name: "srcnn"  # Options: srcnn, vdsr, edvr, basicvsr++
  channels: 3
  scale_factor: 2
  checkpoint_path: "checkpoints/best.pth"

# Data configuration
data:
  num_samples: 200
  patch_size: 64
  num_workers: 4

# Evaluation configuration
evaluation:
  batch_size: 4
  metrics: ["psnr", "ssim", "lpips", "temporal_consistency"]

# Device configuration
device: "auto"  # Options: auto, cuda, mps, cpu

# Random seed
seed: 42
